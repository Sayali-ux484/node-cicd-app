version: 0.2

phases:
  install:
    commands:
      - echo "Setting up SSH"
      - echo "$SSH_KEY" > key.pem
      - chmod 400 key.pem

  build:
    commands:
      - echo "Deploying to EC2"
      - ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@3.110.127.233"cd ~/node-cicd-app && git pull && npm install && pm2 restart app"
